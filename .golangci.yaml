version: "2"
run:
  timeout: 6m
  build-tags:
    - integration
linters:
  enable:
    - forcetypeassert
  exclusions:
    paths:
      - ".*\\.pb\\.go$"
      - "pkg/assembler/generated/.*"
      - "resolvers/schema\\.resolvers\\.go"
    rules:
      - path: _test\.go
        linters:
        - forcetypeassert # test files use mocks
issues:
  max-same-issues: 50
